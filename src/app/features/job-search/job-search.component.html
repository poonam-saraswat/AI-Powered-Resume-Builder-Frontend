<div class="job-search">
  <h2>Find your next job</h2>

  <form class="search-bar" (ngSubmit)="onSearch()">
    <input type="text" [(ngModel)]="query" name="query"
           placeholder="Job title, skills or company (e.g. React developer)" />
    <input type="text" [(ngModel)]="location" name="location"
           placeholder="Location (e.g. Bangalore, Remote)" />
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Searching…' : 'Search' }}
    </button>
  </form>

  <p *ngIf="error" class="error">{{ error }}</p>

  <div *ngIf="!loading && results.length === 0 && !error" class="empty">
    Try searching for "frontend developer", "data analyst", etc.
  </div>

  <div class="results">
    <article *ngFor="let job of results" class="job-card">
      <img *ngIf="job.companyLogo" [src]="job.companyLogo" alt="logo" class="logo" />
      <div class="job-body">
        <h3>{{ job.title }}</h3>
        <p class="meta">
          <strong>{{ job.company }}</strong> · {{ job.location }}
          <span *ngIf="job.employmentType"> · {{ job.employmentType }}</span>
        </p>
        <p *ngIf="job.salary" class="salary">{{ job.salary }}</p>
        <p class="desc">{{ (job.description || '') | slice:0:240 }}…</p>
        <div class="footer">
          <small>Source: {{ job.source }}</small>
          <button (click)="open(job.applyUrl)">Apply</button>
        </div>
      </div>
    </article>
  </div>

  <div *ngIf="results.length" class="pagination">
    <button (click)="prev()" [disabled]="page===1 || loading">Prev</button>
    <span>Page {{ page }}</span>
    <button (click)="next()" [disabled]="loading">Next</button>
  </div>
</div>
